baseURL: "https://examplesite.com/"
title: Maroisa
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: development
  title: Maroisa
  description: "maroisa's personal blog"
  keywords: [Blog, Portfolio, Tutorial, PaperMod]
  author: Me
  DateFormat: "January 2, 2006"
  defaultTheme: dark
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  hideFooter: true
  showtoc: false
  tocopen: false

  assets:
    disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"
    apple_touch_icon: "<link / abs url>"
    safari_pinned_tab: "<link / abs url>"

  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: true
    title: Maroisa
    subtitle: "A stubborn KISS enthusiast"
    imageUrl: "images/hornet.jpg"
    imageWidth: 120
    imageHeight: 120
    imageTitle: hornet
    buttons:
      - name: Archive
        url: "/archive"
      - name: Github
        url: "https://github.com/maroisa/"

  socialIcons:
    - name: instagram
      url: "https://instagram.com/maroiisa"
    - name: github
      url: "https://github.com/maroisa/"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - JSON

menu:
  main:
    - identifier: about
      name: about
      url: /about/
      weight: 1
    - identifier: archive
      name: archive
      url: /archive/
      weight: 2
    - identifier: project
      name: project
      url: /project/
      weight: 3
    - identifier: search
      name: search
      url: /search/
      weight: 4
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    # noClasses: true
    # anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: vim
